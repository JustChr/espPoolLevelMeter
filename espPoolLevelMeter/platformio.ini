[env:d1_mini]
platform      = espressif8266
board         = d1_mini
framework     = arduino

board_build.filesystem = spiffs

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^6.21

build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
    -Os